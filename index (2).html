<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Modern Calculator</title>

<style>
body{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:linear-gradient(135deg,#1f1f1f,#3a3a3a);
  font-family:Arial, sans-serif;
}

.calculator{
  background:#222;
  padding:20px;
  border-radius:15px;
  width:320px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.display{
  background:#000;
  color:#fff;
  padding:15px;
  border-radius:10px;
  text-align:right;
  margin-bottom:15px;
}

#expression{
  font-size:18px;
  min-height:25px;
  color:#bbb;
}

#result{
  font-size:28px;
  font-weight:bold;
}

.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

button{
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

.number{background:#fff;color:#444;}
.operator{background:orange;color:#fff;}
.equal{background:#28a745;color:#fff; grid-column:span 2;}
.clear{background:#dc3545;color:#fff;}
.delete{background:#6c757d;color:#fff;}
</style>
</head>

<body>

<div class="calculator">

  <div class="display">
    <div id="expression"></div>
    <div id="result">0</div>
  </div>

  <div class="buttons">
    <button onclick="clearAll()" class="clear">C</button>
    <button onclick="deleteLast()" class="delete">⌫</button>
    <button onclick="append('%')" class="operator">%</button>
    <button onclick="append('/')" class="operator">÷</button>

    <button onclick="append('7')" class="number">7</button>
    <button onclick="append('8')" class="number">8</button>
    <button onclick="append('9')" class="number">9</button>
    <button onclick="append('*')" class="operator">×</button>

    <button onclick="append('4')" class="number">4</button>
    <button onclick="append('5')" class="number">5</button>
    <button onclick="append('6')" class="number">6</button>
    <button onclick="append('-')" class="operator">−</button>

    <button onclick="append('1')" class="number">1</button>
    <button onclick="append('2')" class="number">2</button>
    <button onclick="append('3')" class="number">3</button>
    <button onclick="append('+')" class="operator">+</button>

    <button onclick="append('0')" class="number">0</button>
    <button onclick="append('.')" class="number">.</button>
    <button onclick="calculate()" class="equal">=</button>
  </div>
</div>

<script>
let expressionDisplay = document.getElementById("expression");
let resultDisplay = document.getElementById("result");
let expression = "";

function append(value){
  expression += value;
  updateDisplay();
}

function clearAll(){
  expression = "";
  resultDisplay.textContent = "0";
  expressionDisplay.textContent = "";
}

function deleteLast(){
  expression = expression.slice(0,-1);
  updateDisplay();
}

function calculate(){
  try{
    let result = eval(expression);
    resultDisplay.textContent = result;
    expression = result.toString();
    expressionDisplay.textContent = "";
  }catch{
    resultDisplay.textContent = "Error";
  }
}

function updateDisplay(){
  expressionDisplay.textContent = expression;
  try{
    let result = eval(expression);
    resultDisplay.textContent = result;
  }catch{
    resultDisplay.textContent = "";
  }
}

/* Keyboard Support */
document.addEventListener("keydown", function(e){
  if("0123456789+-*/.%".includes(e.key)){
    append(e.key);
  }
  else if(e.key === "Enter"){
    calculate();
  }
  else if(e.key === "Backspace"){
    deleteLast();
  }
  else if(e.key === "Escape"){
    clearAll();
  }
});
</script>

</body>
</html>
